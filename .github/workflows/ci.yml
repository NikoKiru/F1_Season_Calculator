name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIN_COVERAGE: 70

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app tests

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/unit tests/api -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${{ env.MIN_COVERAGE }}

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: app/static/dist
          retention-days: 30

  app-validation:
    name: App startup validation
    runs-on: ubuntu-latest
    needs: [lint, test, frontend-build]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download frontend build
        uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: app/static/dist

      - name: Seed sample data + DB
        run: f1 setup

      - name: Boot uvicorn and verify endpoints
        run: |
          uvicorn "app.main:create_app" --factory --host 127.0.0.1 --port 8000 &
          BOOT_PID=$!
          # Wait up to 15s for the port to start accepting connections.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/ -o /dev/null 2>&1; then break; fi
            sleep 0.5
          done
          # Validate SSR pages return 200 and serve real built assets.
          curl -fsS http://127.0.0.1:8000/ -o /tmp/home.html
          curl -fsS http://127.0.0.1:8000/api/openapi.json -o /dev/null
          # The page must reference a hashed JS asset emitted by Vite, not the
          # dev-mode fallback (src/main.ts). Catches a missing/empty manifest.
          if ! grep -qE 'static/dist/assets/main-[A-Za-z0-9_-]+\.js' /tmp/home.html; then
            echo "::error::home page does not reference a hashed Vite asset — manifest missing?"
            cat /tmp/home.html | head -30
            kill $BOOT_PID
            exit 1
          fi
          kill $BOOT_PID

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [lint, test, frontend-build]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Download frontend build
        uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: app/static/dist

      - name: Create build info
        run: |
          echo "BUILD_SHA=${{ github.sha }}" > build-info.txt
          echo "BUILD_REF=${{ github.ref }}" >> build-info.txt
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> build-info.txt

      - name: Verify frontend assets present
        run: test -f app/static/dist/manifest.json

      - name: Create deployment package
        # Path-anchored excludes (leading ./) so we don't accidentally drop
        # app/static/dist/ — that's the frontend bundle we just downloaded
        # and need inside the tarball.
        run: |
          mkdir -p dist
          tar -czvf dist/app-${{ github.sha }}.tar.gz \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./.pytest_cache' \
            --exclude='./.venv' \
            --exclude='./instance' \
            --exclude='./node_modules' \
            --exclude='./web/node_modules' \
            --exclude='./web/dist' \
            --exclude='./dist' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            .

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-package
          path: dist/app-${{ github.sha }}.tar.gz
          retention-days: 30
