<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}F1 Season Calculator{% endblock %}</title>
  <meta name="description" content="{% block description %}Explore every possible F1 championship outcome for the season.{% endblock %}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='54' font-size='54'%3E%F0%9F%8F%81%3C/text%3E%3C/svg%3E">
  {{ vite_style("src/styles/main.css") }}
  {% block head %}{% endblock %}
</head>
<body>
  <a href="#main" class="skip-to-content">Skip to main content</a>
  {% include "partials/header.html" %}
  <main id="main">
    <div class="container">
      {% block breadcrumbs %}{% endblock %}
      {% block content %}{% endblock %}
    </div>
  </main>
  {{ vite_script("src/main.ts") }}
  {% block scripts %}{% endblock %}
</body>
</html>
