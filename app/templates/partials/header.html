<header class="site-header">
  <div class="site-header__inner">
    <a href="/" class="site-header__brand">F1 Season Calculator</a>
    <button type="button" class="hamburger" data-hamburger
            aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
      <span aria-hidden="true">☰</span>
    </button>
    <nav id="site-nav" class="site-nav" data-site-nav aria-label="Primary">
      <a href="/" class="site-nav__link">Home</a>
      <div class="nav-group" data-nav-group>
        <button type="button" class="nav-group__trigger" data-nav-trigger
                aria-expanded="false" aria-haspopup="true" aria-controls="nav-drivers-menu">
          Drivers <span class="nav-group__caret" aria-hidden="true">▾</span>
        </button>
        <ul id="nav-drivers-menu" class="nav-group__menu" role="menu">
          <li role="none"><a role="menuitem" href="/drivers">All Drivers</a></li>
          <li role="none"><a role="menuitem" href="/highest-position">Highest Position</a></li>
          <li role="none"><a role="menuitem" href="/driver-positions">Driver Positions</a></li>
          <li role="none"><a role="menuitem" href="/min-races-to-win">Min Races to Win</a></li>
        </ul>
      </div>
      <div class="nav-group" data-nav-group>
        <button type="button" class="nav-group__trigger" data-nav-trigger
                aria-expanded="false" aria-haspopup="true" aria-controls="nav-championships-menu">
          Championships <span class="nav-group__caret" aria-hidden="true">▾</span>
        </button>
        <ul id="nav-championships-menu" class="nav-group__menu" role="menu">
          <li role="none"><a role="menuitem" href="/create-championship">Create Championship</a></li>
          <li role="none"><a role="menuitem" href="/all-championship-wins">All Championship Wins</a></li>
          <li role="none"><a role="menuitem" href="/championship-win-probability">Win Probability</a></li>
        </ul>
      </div>
      <div class="nav-group" data-nav-group>
        <button type="button" class="nav-group__trigger" data-nav-trigger
                aria-expanded="false" aria-haspopup="true" aria-controls="nav-compare-menu">
          Compare <span class="nav-group__caret" aria-hidden="true">▾</span>
        </button>
        <ul id="nav-compare-menu" class="nav-group__menu" role="menu">
          <li role="none"><a role="menuitem" href="/head-to-head">Head to Head</a></li>
        </ul>
      </div>
    </nav>
    <div class="site-header__controls">
      <form class="global-search" data-global-search role="search" aria-label="Find championship by ID">
        <label class="visually-hidden" for="global-search-input">Championship ID</label>
        <input id="global-search-input" class="input" name="championship_id" type="search" placeholder="Championship #" />
        <button class="btn btn--sm btn--ghost" type="submit" aria-label="Go">Go</button>
      </form>
      {% if seasons %}
      <label class="visually-hidden" for="season-switcher">Season</label>
      <select id="season-switcher" class="season-switcher" data-season-switcher aria-label="Season">
        {% for year in seasons %}
          <option value="{{ year }}" {% if year == current_season %}selected{% endif %}>{{ year }}</option>
        {% endfor %}
      </select>
      {% endif %}
    </div>
  </div>
</header>
